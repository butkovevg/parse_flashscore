[tool.ruff]
# Включаем стандартные правила (аналог flake8)
lint.select = ["E", "F"]  # PEP8 ошибки и синтаксические ошибки
lint.ignore = ["E501"]    # Игнорируем длинные строки

# Автопоправки
fix = false

# Можно указать, какие файлы игнорировать
exclude = [
    ".git",
    "__pycache__",
    "venv"
]