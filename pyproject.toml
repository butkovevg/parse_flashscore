[tool.ruff]
## Включаем стандартные правила (аналог flake8)
#select = ["E", "F"]  # PEP8 ошибки и синтаксические ошибки
#ignore = ["E501"]    # Игнорируем длинные строки

# Включаем расширенные правила
lint.select = [
    "E", # PEP8 ошибки
    "W", # PEP8 предупреждения
    "F", # Синтаксические ошибки
    "I", # isort
    "UP", # pyupgrade
    "IC", # isinstance и др.
    "B", # Безопасность (bandit)
    "PL", # pylint-правила
]
lint.ignore = ["E501", "E402"]  # Игнорируем длинные строки и импорты не в начале файла

# Автопоправки
fix = false
target-version = "py310"  # Версия Python, для которой проверяем
# Можно указать, какие файлы игнорировать
exclude = [
    ".git",
    "__pycache__",
    "venv"
]

