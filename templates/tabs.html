<style>
.star-button.yellow {
   background-color: yellow;
}

.star-button.gray {
   background-color: gray;
}

</style>

<html>
<head>
   <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
   <title>My Page</title>
   <h1> matches1 </h1>
    <td>
        {% if status %}
            <button id="myButton" class="star-button yellow">★</button>
        {% else %}
            <button id="myButton" class="star-button gray">★</button>
        {% endif %}
    </td>
</head>
<body>
   <h1> matches2 </h1>
   <div class="favorite-button">
       <input type="checkbox" id="favorite-checkbox" />
       <label for="favorite-checkbox" class="star"></label>
   </div>
   <h1> matches4 </h1>
</body>
</html>
<script>
document.getElementById('myButton').addEventListener('click', function() {
   this.classList.toggle('yellow');
   this.classList.toggle('gray');
});
</script>
